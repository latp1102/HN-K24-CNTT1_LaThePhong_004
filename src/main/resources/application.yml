spring:
  application:
    name: cntt1_exam
  # datasource
  datasource:
    url: jdbc:mysql://localhost:3307/hnk24cntt1lathephong_004?createDatabaseIfNotExist=true
    username: root
    password: 123456

  # jpa
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: true

  # thymeleaf
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # cấu hình về upload file
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB